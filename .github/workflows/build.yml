name: Build icfox ESP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Visual Studio Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Compile icfox ESP
      shell: powershell
      run: |
        Set-Location icfox
        cl /nologo /O2 /EHsc /MD /std:c++17 /I. main.cpp Renderer.cpp /link user32.lib gdi32.lib d3d11.lib dxgi.lib d3dcompiler.lib dwmapi.lib /SUBSYSTEM:WINDOWS /OUT:icfox.exe
        if ($LASTEXITCODE -ne 0) { throw "Build failed with exit code $LASTEXITCODE" }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: icfox-esp
        path: icfox/icfox.exe
        if-no-files-found: error